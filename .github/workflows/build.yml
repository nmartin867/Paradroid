name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package app bundle
        run: ./build.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ScrcpyConnect
          path: ScrcpyConnect.app/
