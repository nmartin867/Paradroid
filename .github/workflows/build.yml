name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app and DMG
        run: make dmg

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ScrcpyConnect.app
          path: ScrcpyConnect.app/

      - name: Upload DMG installer
        uses: actions/upload-artifact@v4
        with:
          name: ScrcpyConnect.dmg
          path: ScrcpyConnect.dmg
